# Netlify build configuration for Intend v0.5 monorepo
# Web app: apps/web (Next.js 14)
# Bot + cron: GCP VM (not Netlify)

[build]
  # Build from monorepo root — Turborepo resolves all workspace dependencies
  base          = "."
  command       = "npx turbo build --filter=@intend/web"
  publish       = "apps/web/.next"

[build.environment]
  NODE_VERSION  = "22"
  YARN_VERSION  = "1.22.22"
  # Tell @netlify/plugin-nextjs where the Next.js project lives
  NEXT_TELEMETRY_DISABLED = "1"

# Netlify Next.js plugin — handles SSR, image optimization, and API routes
[[plugins]]
  package = "@netlify/plugin-nextjs"

[dev]
  command    = "yarn workspace @intend/web dev"
  port       = 3000
  targetPort = 3000
